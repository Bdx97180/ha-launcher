<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mes Maisons">
<meta name="theme-color" content="#0a0a0f">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>Mes Maisons</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c27;
    --border: rgba(255,255,255,0.07);
    --accent: #c9a96e;
    --accent2: #7e9eff;
    --text: #f0ede8;
    --muted: #6b6b7a;
    --success: #4ade80;
    --danger: #f87171;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100dvh;
    padding: env(safe-area-inset-top, 20px) 0 env(safe-area-inset-bottom, 0);
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: -40%;
    left: -20%;
    width: 80vw;
    height: 80vw;
    background: radial-gradient(circle, rgba(201,169,110,0.06) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .app { position: relative; z-index: 1; max-width: 480px; margin: 0 auto; padding: 0 20px 40px; }

  /* Header */
  header { padding: 48px 0 36px; text-align: center; }
  .logo-ring {
    width: 160px; height: 38px;
    margin: 0 auto 20px;
    display: flex; align-items: center; justify-content: center;
  }
  .logo-ring svg { width: 160px; height: 38px; }
  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    font-weight: 400;
    letter-spacing: -0.3px;
    color: var(--text);
    margin-bottom: 6px;
  }
  header p { font-size: 13px; color: var(--muted); font-weight: 300; letter-spacing: 0.5px; }

  /* Cards grid */
  .grid { display: grid; grid-template-columns: 1fr; gap: 12px; margin-bottom: 32px; }

  .villa-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    cursor: pointer;
    text-decoration: none;
    position: relative;
    overflow: hidden;
    transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease;
  }
  .villa-card::before {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 0.18s;
    border-radius: 20px;
  }
  .villa-card:nth-child(odd)::before { background: radial-gradient(circle at 20% 50%, rgba(201,169,110,0.08), transparent 60%); }
  .villa-card:nth-child(even)::before { background: radial-gradient(circle at 20% 50%, rgba(126,158,255,0.08), transparent 60%); }
  .villa-card:active { transform: scale(0.975); }
  .villa-card:hover { border-color: rgba(255,255,255,0.13); background: var(--surface2); }
  .villa-card:hover::before { opacity: 1; }

  .card-icon {
    width: 52px; height: 52px; flex-shrink: 0;
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
    border: 1px solid var(--border);
  }
  .villa-card:nth-child(odd) .card-icon { background: rgba(201,169,110,0.1); }
  .villa-card:nth-child(even) .card-icon { background: rgba(126,158,255,0.1); }

  .card-body { flex: 1; min-width: 0; }
  .card-name {
    font-size: 17px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card-url {
    font-size: 12px;
    color: var(--muted);
    font-family: monospace;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card-arrow {
    color: var(--muted);
    flex-shrink: 0;
    transition: transform 0.18s, color 0.18s;
  }
  .villa-card:hover .card-arrow { transform: translateX(3px); color: var(--accent); }

  /* Divider */
  .divider {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 20px;
  }
  .divider span { font-size: 11px; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; white-space: nowrap; }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* Edit button */
  .edit-btn {
    width: 100%;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 20px;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    transition: color 0.18s, border-color 0.18s, background 0.18s;
  }
  .edit-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.15); background: var(--surface); }
  .edit-btn svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 1.5; }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(8px);
    z-index: 100;
    display: flex; align-items: flex-end;
    opacity: 0; pointer-events: none;
    transition: opacity 0.25s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 28px 28px 0 0;
    padding: 12px 24px calc(env(safe-area-inset-bottom, 0px) + 32px);
    width: 100%;
    transform: translateY(40px);
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    max-height: 88dvh;
    overflow-y: auto;
  }
  .modal-overlay.open .modal { transform: translateY(0); }

  .modal-handle {
    width: 40px; height: 4px;
    background: var(--surface2);
    border-radius: 2px;
    margin: 0 auto 20px;
  }
  .modal h2 {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 400;
    margin-bottom: 6px;
  }
  .modal .modal-sub {
    font-size: 13px; color: var(--muted); margin-bottom: 24px;
  }

  /* Villa editor rows */
  .villa-editor {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 12px;
  }
  .villa-editor-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 14px;
  }
  .villa-editor-title { font-size: 14px; font-weight: 500; color: var(--muted); }
  .del-btn {
    background: rgba(248,113,113,0.1); border: none;
    border-radius: 8px; padding: 4px 10px;
    color: var(--danger); font-size: 12px; cursor: pointer;
    transition: background 0.15s;
  }
  .del-btn:hover { background: rgba(248,113,113,0.2); }

  .field { margin-bottom: 10px; }
  .field label { font-size: 11px; color: var(--muted); letter-spacing: 0.8px; text-transform: uppercase; display: block; margin-bottom: 5px; }
  .field input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.15s;
  }
  .field input:focus { border-color: rgba(201,169,110,0.4); }
  .field input::placeholder { color: var(--muted); }

  .emoji-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px; }
  .emoji-pick {
    width: 36px; height: 36px;
    border-radius: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: border-color 0.15s, background 0.15s;
  }
  .emoji-pick:hover, .emoji-pick.active { border-color: var(--accent); background: rgba(201,169,110,0.1); }

  .add-villa-btn {
    width: 100%;
    background: transparent;
    border: 1px dashed rgba(255,255,255,0.15);
    border-radius: 14px;
    padding: 13px;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 6px;
    transition: color 0.15s, border-color 0.15s;
    margin-bottom: 20px;
  }
  .add-villa-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.25); }

  .save-btn {
    width: 100%;
    background: var(--accent);
    border: none;
    border-radius: 14px;
    padding: 15px;
    color: #0a0a0f;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .save-btn:hover { opacity: 0.88; }

  /* Footer */
  footer { text-align: center; margin-top: 16px; }
  footer p { font-size: 11px; color: var(--muted); letter-spacing: 0.3px; }

  /* Animations */
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .villa-card { animation: fadeIn 0.35s ease both; }
  .villa-card:nth-child(1) { animation-delay: 0.05s; }
  .villa-card:nth-child(2) { animation-delay: 0.12s; }
  .villa-card:nth-child(3) { animation-delay: 0.19s; }
  .villa-card:nth-child(4) { animation-delay: 0.26s; }
</style>
</head>
<body>

<div class="app">
  <header>
    <div class="logo-ring">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 100">
        <g transform="translate(10, 10)">
          <circle cx="40" cy="40" r="34" fill="none" stroke="#FFFFFF" stroke-width="9"
            stroke-dasharray="181 53" stroke-linecap="round"
            transform="rotate(-130, 40, 40)"/>
          <polygon points="46,14 28,44 38,44 34,66 52,36 42,36" fill="#FFFFFF"/>
        </g>
        <text x="110" y="72" font-family="system-ui,-apple-system,sans-serif"
          font-size="58" font-weight="300" fill="#FFFFFF" letter-spacing="-2">Opti</text>
        <text x="230" y="72" font-family="system-ui,-apple-system,sans-serif"
          font-size="58" font-weight="700" fill="#FFFFFF" letter-spacing="-2">Home</text>
        <text x="111" y="92" font-family="system-ui,-apple-system,sans-serif"
          font-size="11" font-weight="400" fill="rgba(255,255,255,0.5)" letter-spacing="5">ÉNERGIE</text>
      </svg>
    </div>
    <h1>Mes Maisons</h1>
    <p>Sélectionnez une propriété</p>
  </header>

  <div class="grid" id="villa-grid"></div>

  <div class="divider"><span>Paramètres</span></div>

  <button class="edit-btn" onclick="openModal()">
    <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
    Gérer les maisons
  </button>

  <footer>
    <p>HA Launcher · Données stockées localement</p>
    <p style="margin-top:6px; font-size:11px; color:#3a3a48;">by Didier CAILLON · 2026</p>
  </footer>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="handleOverlayClick(event)">
  <div class="modal" id="modal">
    <div class="modal-handle"></div>
    <h2>Gérer les maisons</h2>
    <p class="modal-sub">Modifiez, ajoutez ou supprimez (max 4)</p>
    <div id="editor-list"></div>
    <button class="add-villa-btn" id="add-btn" onclick="addVilla()">+ Ajouter une maison</button>
    <button class="save-btn" onclick="saveAndClose()">Enregistrer</button>
  </div>
</div>

<script>
const EMOJIS = ['🏡','🏠','🌴','🏖️','🗻','🏕️','🏘️','🏯'];

const DEFAULT_VILLAS = [
  { name: 'Villa Bwadeden', url: 'http://100.68.77.34:8123', emoji: '🏡' },
  { name: 'Palm Oasis',     url: 'http://100.101.5.110:8123', emoji: '🌴' }
];

function load() {
  try {
    const s = localStorage.getItem('ha_villas');
    return s ? JSON.parse(s) : DEFAULT_VILLAS;
  } catch { return DEFAULT_VILLAS; }
}

function save(villas) {
  localStorage.setItem('ha_villas', JSON.stringify(villas));
}

function renderGrid() {
  const villas = load();
  const grid = document.getElementById('villa-grid');
  grid.innerHTML = '';
  villas.forEach((v, i) => {
    const a = document.createElement('div');
    a.className = 'villa-card';
    a.setAttribute('role', 'button');
    a.setAttribute('tabindex', '0');
    a.onclick = () => window.open(v.url, '_blank');
    a.onkeydown = (e) => { if (e.key === 'Enter') window.open(v.url, '_blank'); };
    a.innerHTML = `
      <div class="card-icon">${v.emoji}</div>
      <div class="card-body">
        <div class="card-name">${escHtml(v.name)}</div>
        <div class="card-url">${escHtml(v.url)}</div>
      </div>
      <div class="card-arrow">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </div>`;
    grid.appendChild(a);
  });
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function openModal() {
  const villas = load();
  renderEditor(villas);
  document.getElementById('modal-overlay').classList.add('open');
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

function renderEditor(villas) {
  const list = document.getElementById('editor-list');
  list.innerHTML = '';
  villas.forEach((v, i) => {
    const div = document.createElement('div');
    div.className = 'villa-editor';
    div.dataset.index = i;
    div.innerHTML = `
      <div class="villa-editor-header">
        <span class="villa-editor-title">Maison ${i+1}</span>
        <button class="del-btn" onclick="deleteVilla(${i})">Supprimer</button>
      </div>
      <div class="field">
        <label>Nom</label>
        <input type="text" class="v-name" value="${escHtml(v.name)}" placeholder="Nom de la maison">
      </div>
      <div class="field">
        <label>Adresse IP (URL complète)</label>
        <input type="url" class="v-url" value="${escHtml(v.url)}" placeholder="http://100.x.x.x:8123">
      </div>
      <div class="field">
        <label>Icône</label>
        <div class="emoji-row">
          ${EMOJIS.map(e => `<button class="emoji-pick${e===v.emoji?' active':''}" onclick="pickEmoji(this,'${e}')">${e}</button>`).join('')}
        </div>
      </div>`;
    list.appendChild(div);
  });
  updateAddBtn(villas.length);
}

function pickEmoji(btn, emoji) {
  btn.closest('.villa-editor').querySelectorAll('.emoji-pick').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function getEditorData() {
  return Array.from(document.querySelectorAll('.villa-editor')).map(div => ({
    name: div.querySelector('.v-name').value.trim() || 'Maison',
    url:  div.querySelector('.v-url').value.trim() || 'http://',
    emoji: div.querySelector('.emoji-pick.active')?.textContent || '🏠'
  }));
}

function deleteVilla(i) {
  const villas = getEditorData();
  villas.splice(i, 1);
  renderEditor(villas);
}

function addVilla() {
  const villas = getEditorData();
  if (villas.length >= 4) return;
  villas.push({ name: 'Nouvelle maison', url: 'http://100.x.x.x:8123', emoji: '🏠' });
  renderEditor(villas);
}

function updateAddBtn(count) {
  const btn = document.getElementById('add-btn');
  btn.style.display = count >= 4 ? 'none' : 'flex';
}

function saveAndClose() {
  const villas = getEditorData();
  save(villas);
  closeModal();
  renderGrid();
}

renderGrid();
</script>
</body>
</html>
